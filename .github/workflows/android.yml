name: Android CI

on: [ push ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: check out code recursively
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"
          cache: gradle
      - name: Build with Gradle
        run: |
          touch local.properties
          ./gradlew build
